<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2 -- Mitigation Actions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    background: #e8e8e8;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 32px;
  }
  .slide {
    background: #ffffff;
    width: 1280px;
    height: 720px;
    padding: 36px 48px 24px;
    display: flex;
    flex-direction: column;
  }
  .slide-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px; border-bottom: 3px solid #eee; padding-bottom: 12px;
  }
  .slide-title { font-size: 34px; font-weight: 700; color: #111; }
  .slide-date  { font-size: 18px; color: #999; font-weight: 500; }

  /* column headers above diagrams */
  .col-headers {
    display: flex; margin-bottom: 6px; padding: 0 4px;
  }
  .col-h {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; text-align: center;
  }
  .col-h.risk    { width: 270px; color: #b91c1c; }
  .col-h.action  { width: 290px; margin-left: 80px; color: #1d4ed8; }
  .col-h.outcome { width: 290px; margin-left: 80px; color: #15803d; }

  .lanes { flex: 1; display: flex; flex-direction: column; }
  .lane { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .lane-divider { border: none; border-top: 2px solid #f0f0f0; flex-shrink: 0; }

  .lane-label { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .lane-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .lane-icon.cost    { background: #fee2e2; }
  .lane-icon.soc     { background: #fef3c7; }
  .lane-icon.thermal { background: #fee2e2; }
  .lane-title { font-size: 17px; font-weight: 700; color: #111; }

  .diagram-wrap { width: 100%; display: flex; justify-content: center; }
  svg.diagram { display: block; overflow: visible; }
</style>
</head>
<body>

<div class="slide">
  <div class="slide-header">
    <div class="slide-title">Mitigation Actions</div>
    <div class="slide-date">May 2026</div>
  </div>

  <!-- Column headers -->
  <div class="col-headers">
    <div class="col-h risk">Risk</div>
    <div class="col-h action">Actions</div>
    <div class="col-h outcome">Outcome</div>
  </div>

  <div class="lanes">

    <!-- ========== LANE 1 — Pack / Charger Cost ========== -->
    <div class="lane">
      <div class="lane-label">
        <div class="lane-icon cost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="#b91c1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="lane-title">1. Pack / Charger Cost</div>
      </div>
      <div class="diagram-wrap">
        <svg class="diagram" viewBox="0 0 1080 150" width="1080" height="150" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9Z" fill="#aaa"/></marker>
          </defs>
          <!-- arrows -->
          <path d="M272,75 C315,75 315,37 350,37"  fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a1)"/>
          <path d="M272,75 C315,75 315,113 350,113" fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a1)"/>
          <path d="M640,37 C675,37 675,75 720,75"   fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a1)"/>
          <path d="M640,113 C675,113 675,75 720,75"  fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a1)"/>
          <!-- Risk node -->
          <rect x="2" y="42" width="270" height="66" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
          <rect x="2" y="42" width="7"   height="66" rx="4"  fill="#dc2626"/>
          <!-- risk icon -->
          <svg x="16" y="52" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/></svg>
          <foreignObject x="40" y="42" width="232" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:600 17px/1.3 Segoe UI,Arial,sans-serif;color:#991b1b;padding:0 4px">
              Cost of EU / US packs &amp; chargers
            </div>
          </foreignObject>
          <!-- Action A -->
          <rect x="350" y="4" width="290" height="66" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
          <rect x="350" y="4" width="7"   height="66" rx="4"  fill="#2563eb"/>
          <svg x="364" y="14" width="20" height="20" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2M9 5h6M9 14l2 2 4-4" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <foreignObject x="386" y="4" width="254" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:500 17px/1.3 Segoe UI,Arial,sans-serif;text-align:center;color:#1e40af;padding:0 4px">
              Collect quotes from supplier shortlist
            </div>
          </foreignObject>
          <!-- Action B -->
          <rect x="350" y="80" width="290" height="66" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
          <rect x="350" y="80" width="7"   height="66" rx="4"  fill="#2563eb"/>
          <svg x="364" y="90" width="20" height="20" viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.25 3.83 10.17 9 11.38C17.17 23.17 21 18.25 21 13V7l-9-5z" stroke="#2563eb" stroke-width="1.8" stroke-linejoin="round" fill="none"/></svg>
          <foreignObject x="386" y="80" width="254" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:500 17px/1.3 Segoe UI,Arial,sans-serif;text-align:center;color:#1e40af;padding:0 4px">
              Challenge NDAA / FCC / TAA scope
            </div>
          </foreignObject>
          <!-- Outcome -->
          <rect x="720" y="42" width="290" height="66" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
          <rect x="720" y="42" width="7"   height="66" rx="4"  fill="#16a34a"/>
          <svg x="734" y="52" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><path d="M9 12l2 2 4-4" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <foreignObject x="758" y="42" width="252" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:600 17px/1.3 Segoe UI,Arial,sans-serif;color:#166534;padding:0 4px">
              Cost-aware supplier trade-off matrix
            </div>
          </foreignObject>
        </svg>
      </div>
    </div>

    <hr class="lane-divider">

    <!-- ========== LANE 2 — SoC Estimation ========== -->
    <div class="lane">
      <div class="lane-label">
        <div class="lane-icon soc">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="#92400e" stroke-width="2.5"/><circle cx="12" cy="12" r="3" stroke="#92400e" stroke-width="2"/></svg>
        </div>
        <div class="lane-title">2. SoC Estimation</div>
      </div>
      <div class="diagram-wrap">
        <svg class="diagram" viewBox="0 0 1080 150" width="1080" height="150" xmlns="http://www.w3.org/2000/svg">
          <defs><marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9Z" fill="#aaa"/></marker></defs>
          <path d="M272,75 C315,75 315,37 350,37"  fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a2)"/>
          <path d="M272,75 C315,75 315,113 350,113" fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a2)"/>
          <path d="M640,37 C675,37 675,75 720,75"   fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a2)"/>
          <path d="M640,113 C675,113 675,75 720,75"  fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a2)"/>
          <!-- Risk -->
          <rect x="2" y="42" width="270" height="66" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
          <rect x="2" y="42" width="7"   height="66" rx="4"  fill="#dc2626"/>
          <svg x="16" y="52" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/></svg>
          <foreignObject x="40" y="42" width="232" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:600 17px/1.3 Segoe UI,Arial,sans-serif;color:#991b1b;padding:0 4px">
              SoC estimation accuracy
            </div>
          </foreignObject>
          <!-- Action A -->
          <rect x="350" y="4" width="290" height="66" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
          <rect x="350" y="4" width="7"   height="66" rx="4"  fill="#2563eb"/>
          <svg x="364" y="14" width="20" height="20" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2M9 5h6M9 14l2 2 4-4" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <foreignObject x="386" y="4" width="254" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:500 17px/1.3 Segoe UI,Arial,sans-serif;text-align:center;color:#1e40af;padding:0 4px">
              Stress-test TI BQ41z90 algorithm
            </div>
          </foreignObject>
          <!-- Action B -->
          <rect x="350" y="80" width="290" height="66" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
          <rect x="350" y="80" width="7"   height="66" rx="4"  fill="#2563eb"/>
          <svg x="364" y="90" width="20" height="20" viewBox="0 0 24 24"><path d="M3 3v18h18" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M7 16l4-6 4 4 5-8" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <foreignObject x="386" y="80" width="254" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:500 17px/1.3 Segoe UI,Arial,sans-serif;text-align:center;color:#1e40af;padding:0 4px">
              Characterise Si-anode voltage drift vs. graphite
            </div>
          </foreignObject>
          <!-- Outcome -->
          <rect x="720" y="42" width="290" height="66" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
          <rect x="720" y="42" width="7"   height="66" rx="4"  fill="#16a34a"/>
          <svg x="734" y="52" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><path d="M9 12l2 2 4-4" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <foreignObject x="758" y="42" width="252" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:600 17px/1.3 Segoe UI,Arial,sans-serif;color:#166534;padding:0 4px">
              Validated SoC under worst-case drift
            </div>
          </foreignObject>
        </svg>
      </div>
    </div>

    <hr class="lane-divider">

    <!-- ========== LANE 3 — Thermal & Cycle Life ========== -->
    <div class="lane">
      <div class="lane-label">
        <div class="lane-icon thermal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 14.76V3.5a2 2 0 1 0-4 0v11.26a4.5 4.5 0 1 0 4 0z" stroke="#b91c1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="lane-title">3. Thermal &amp; Cycle Life</div>
      </div>
      <div class="diagram-wrap">
        <svg class="diagram" viewBox="0 0 1080 150" width="1080" height="150" xmlns="http://www.w3.org/2000/svg">
          <defs><marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9Z" fill="#aaa"/></marker></defs>
          <path d="M272,75 C315,75 315,37 350,37"  fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a3)"/>
          <path d="M272,75 C315,75 315,113 350,113" fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a3)"/>
          <path d="M640,37 C675,37 675,75 720,75"   fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a3)"/>
          <path d="M640,113 C675,113 675,75 720,75"  fill="none" stroke="#ccc" stroke-width="2" marker-end="url(#a3)"/>
          <!-- Risk -->
          <rect x="2" y="42" width="270" height="66" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
          <rect x="2" y="42" width="7"   height="66" rx="4"  fill="#dc2626"/>
          <svg x="16" y="52" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/></svg>
          <foreignObject x="40" y="42" width="232" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:600 17px/1.3 Segoe UI,Arial,sans-serif;color:#991b1b;padding:0 4px">
              High heat release + limited cycle life
            </div>
          </foreignObject>
          <!-- Action A -->
          <rect x="350" y="4" width="290" height="66" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
          <rect x="350" y="4" width="7"   height="66" rx="4"  fill="#2563eb"/>
          <svg x="364" y="14" width="20" height="20" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2M9 5h6M9 14l2 2 4-4" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <foreignObject x="386" y="4" width="254" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:500 17px/1.3 Segoe UI,Arial,sans-serif;text-align:center;color:#1e40af;padding:0 4px">
              Map C-rate, temp &amp; DoD envelopes
            </div>
          </foreignObject>
          <!-- Action B -->
          <rect x="350" y="80" width="290" height="66" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
          <rect x="350" y="80" width="7"   height="66" rx="4"  fill="#2563eb"/>
          <svg x="364" y="90" width="20" height="20" viewBox="0 0 24 24"><path d="M21 21l-6-6M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0z" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
          <foreignObject x="386" y="80" width="254" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:500 17px/1.3 Segoe UI,Arial,sans-serif;text-align:center;color:#1e40af;padding:0 4px">
              Screen alternative cells (high C-rate, low-Si, cylindrical)
            </div>
          </foreignObject>
          <!-- Outcome -->
          <rect x="720" y="42" width="290" height="66" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
          <rect x="720" y="42" width="7"   height="66" rx="4"  fill="#16a34a"/>
          <svg x="734" y="52" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><path d="M9 12l2 2 4-4" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <foreignObject x="758" y="42" width="252" height="66">
            <div xmlns="http://www.w3.org/1999/xhtml" style="height:66px;display:flex;align-items:center;font:600 17px/1.3 Segoe UI,Arial,sans-serif;color:#166534;padding:0 4px">
              Safe limits or validated alternative cell
            </div>
          </foreignObject>
        </svg>
      </div>
    </div>

  </div>
</div>

</body>
</html>
